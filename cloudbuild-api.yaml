steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'me-west1-docker.pkg.dev/stannel-app/stannel/api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'me-west1-docker.pkg.dev/stannel-app/stannel/api:latest'

  # Deploy to Cloud Run with secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'stannel-api'
      - '--image=me-west1-docker.pkg.dev/stannel-app/stannel/api:latest'
      - '--region=me-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--remove-secrets=FIREBASE_PROJECT_ID'
      - '--set-secrets=DATABASE_URL=database-url:latest,FIREBASE_PRIVATE_KEY=firebase-private-key:latest,FIREBASE_CLIENT_EMAIL=firebase-client-email:latest'
      - '--set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=stannel-app,FIREBASE_PROJECT_ID=stannel-app'

timeout: '1800s'
